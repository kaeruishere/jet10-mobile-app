<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="circles-bg">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <!-- Header -->
    <header class="topbar glass-panel">
        <div class="brand">
            <i class="fa-solid fa-gamepad"></i>
            <h1>Admin Panel</h1>
        </div>
    </header>

    <main class="main-content">
        <!-- Add Game Form -->
        <section id="section-add" class="form-section hidden">
            <div class="glass-panel padded-panel">
                <h3><i class="fa-solid fa-plus"></i> Add Game</h3>
                <form id="add-game-form">
                    <div class="form-group">
                        <label>Game Name</label>
                        <input type="text" id="game-name" placeholder="e.g. Helix Jump" required>
                    </div>
                    <div class="form-group">
                        <label>Game URL</label>
                        <input type="url" id="game-url" placeholder="https://example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Image URL (Optional)</label>
                        <input type="url" id="game-image" placeholder="https://example.com/icon.png">
                    </div>
                    <div class="form-group">
                        <label>Cost</label>
                        <input type="number" id="game-cost" placeholder="0" min="0" required>
                    </div>
                    <button type="submit" class="btn-primary" id="add-game-btn">
                        <span>Add Game</span>
                    </button>
                </form>
            </div>
        </section>

        </section>
        
        <!-- Users List -->
        <section id="section-users" class="users-section hidden">
            <h3 style="color: white; margin-bottom: 16px;"><i class="fa-solid fa-users"></i> Registered Devices <span id="user-count" class="badge">0</span></h3>
            <div class="users-list" id="users-list">
                <div class="loading-state">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav glass-panel">
        <button id="nav-list" class="nav-btn active">
            <i class="fa-solid fa-list"></i>
            <span>List</span>
        </button>
        <button id="nav-add" class="nav-btn">
            <i class="fa-solid fa-plus"></i>
            <span>Add</span>
        </button>
        <button id="nav-users" class="nav-btn">
            <i class="fa-solid fa-bell"></i>
            <span>Users</span>
        </button>
    </nav>

    <!-- Edit Modal Overlay -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3><i class="fa-solid fa-pen"></i> Edit Game</h3>
                <button id="close-modal-btn" class="icon-btn"><i class="fa-solid fa-times"></i></button>
            </div>
            <form id="edit-game-form">
                <input type="hidden" id="edit-game-id">
                <div class="form-group">
                    <label>Game Name</label>
                    <input type="text" id="edit-game-name" required>
                </div>
                <div class="form-group">
                    <label>Game URL</label>
                    <input type="url" id="edit-game-url" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="edit-game-image">
                </div>
                <div class="form-group">
                    <label>Cost</label>
                    <input type="number" id="edit-game-cost" min="0" required>
                </div>
                <button type="submit" class="btn-primary" id="edit-game-btn">
                    <span>Update Game</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
